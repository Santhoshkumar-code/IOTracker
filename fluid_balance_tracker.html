<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I/O Fluid Balance Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0f1e;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: #e2e8f0;
    }

    /* Header */
    #header {
      background: linear-gradient(135deg, #0f172a 0%, #0a1628 100%);
      border-bottom: 1px solid #1e3a5f;
      padding: 20px 28px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    #header .subtitle {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
    }
    #btn-add {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 10px 18px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    /* Layout */
    #layout {
      display: flex;
      min-height: calc(100vh - 72px);
    }

    /* Sidebar */
    #sidebar {
      width: 130px;
      flex-shrink: 0;
      background: #060d1a;
      border-right: 1px solid #1e3a5f;
      padding: 12px 0;
      overflow-y: auto;
    }
    .day-btn {
      width: 100%;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      color: #64748b;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.15s;
    }
    .day-btn.active {
      background: linear-gradient(135deg, #0f2a45, #1a1f3a);
      border-left: 3px solid #22d3ee;
      color: #f1f5f9;
    }
    .day-btn .day-name { font-weight: 700; margin-bottom: 2px; }
    .day-btn .day-date { font-size: 10px; color: #475569; }
    .day-btn .day-badges { margin-top: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
    .badge-in  { background: #0e3a4a; color: #22d3ee; border-radius: 3px; padding: 1px 4px; font-size: 9px; }
    .badge-out { background: #3a0e2a; color: #f472b6; border-radius: 3px; padding: 1px 4px; font-size: 9px; }

    /* Main */
    #main {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
    }
    #day-header {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Summary Cards */
    #summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      border-radius: 10px;
      padding: 14px 16px;
    }
    .card-label {
      font-size: 10px;
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }
    .card-unit { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* Balance Bar */
    #balance-bar-section { margin-bottom: 24px; }
    #balance-bar-section .bar-label {
      font-size: 10px;
      color: #475569;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .bar-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .bar-tag { font-size: 10px; width: 40px; text-align: right; }
    .bar-track {
      flex: 1;
      height: 10px;
      background: #0f172a;
      border-radius: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.5s ease;
    }
    .bar-amount { font-size: 10px; width: 55px; }

    /* Entry Log */
    #log-label {
      font-size: 10px;
      color: #475569;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #entries-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-item {
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.4s;
    }
    .entry-tag {
      font-size: 11px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
    }
    .entry-body { flex: 1; min-width: 0; }
    .entry-amount { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .entry-subtype { font-size: 11px; color: #64748b; margin-left: 8px; }
    .entry-note { font-size: 11px; color: #475569; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .entry-time { font-size: 11px; color: #475569; white-space: nowrap; }
    .entry-remove {
      background: none;
      border: none;
      color: #334155;
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
      font-family: inherit;
    }
    .entry-remove:hover { color: #94a3b8; }

    #empty-state {
      border: 1px dashed #1e3a5f;
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      color: #334155;
      font-size: 13px;
      line-height: 1.8;
    }

    /* Modal Overlay */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .modal-eyebrow {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #modal h2 { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 20px; }

    .field-label { font-size: 11px; color: #64748b; margin-bottom: 6px; }
    .field-group { margin-bottom: 16px; }

    .toggle-row { display: flex; gap: 8px; }
    .type-btn {
      flex: 1;
      background: #1e293b;
      border: none;
      border-radius: 7px;
      color: #64748b;
      padding: 9px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      text-transform: capitalize;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }
    .type-btn.active-intake { background: linear-gradient(135deg,#0369a1,#0ea5e9); color: #fff; }
    .type-btn.active-output { background: linear-gradient(135deg,#9d174d,#ec4899); color: #fff; }

    .subtype-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .subtype-btn {
      background: #1e293b;
      border: 1px solid #1e293b;
      border-radius: 5px;
      color: #64748b;
      padding: 5px 10px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      text-transform: capitalize;
      transition: all 0.15s;
    }
    .subtype-btn.active { background: #1e3a5f; border-color: #22d3ee; color: #22d3ee; }

    #amount-input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #f1f5f9;
      padding: 10px 12px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }
    .quick-row { display: flex; gap: 6px; margin-top: 8px; }
    .quick-btn {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 5px;
      color: #64748b;
      padding: 4px 2px;
      font-size: 10px;
      font-family: inherit;
      cursor: pointer;
    }
    .quick-btn:hover { color: #94a3b8; }

    #note-input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #f1f5f9;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    #btn-cancel {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #64748b;
      padding: 11px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    #btn-submit {
      flex: 2;
      background: #1e293b;
      border: none;
      border-radius: 8px;
      color: #334155;
      padding: 11px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: not-allowed;
      transition: background 0.2s, color 0.2s;
    }
    #btn-submit.ready {
      background: linear-gradient(135deg,#0ea5e9,#6366f1);
      color: #fff;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      #summary-cards { grid-template-columns: repeat(2, 1fr); }
      .card-value { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <div class="subtitle">Clinical Fluid Monitor</div>
    <h1>I/O Tracker</h1>
  </div>
  <button id="btn-add">+ Log Entry</button>
</div>

<!-- Main Layout -->
<div id="layout">
  <div id="sidebar"></div>
  <div id="main">
    <div id="day-header"></div>
    <div id="summary-cards">
      <div class="card" id="card-intake" style="background:#0e3a4a;border:1px solid #22d3ee30;">
        <div class="card-label">Total Intake</div>
        <div class="card-value" id="val-intake" style="color:#22d3ee;">↑0</div>
        <div class="card-unit">mL</div>
      </div>
      <div class="card" id="card-output" style="background:#3a0e2a;border:1px solid #f472b630;">
        <div class="card-label">Total Output</div>
        <div class="card-value" id="val-output" style="color:#f472b6;">↓0</div>
        <div class="card-unit">mL</div>
      </div>
      <div class="card" id="card-balance" style="background:#1a1f2e;border:1px solid #a1a1aa30;">
        <div class="card-label">Net Balance</div>
        <div class="card-value" id="val-balance" style="color:#a1a1aa;">+0</div>
        <div class="card-unit">mL</div>
      </div>
    </div>
    <div id="balance-bar-section" style="display:none;">
      <div class="bar-label">Fluid Balance Visualization</div>
      <div class="bar-row">
        <div class="bar-tag" style="color:#22d3ee;">IN</div>
        <div class="bar-track"><div class="bar-fill" id="bar-in" style="background:linear-gradient(90deg,#0ea5e9,#22d3ee);width:0%"></div></div>
        <div class="bar-amount" id="bar-in-label" style="color:#22d3ee;">0 mL</div>
      </div>
      <div class="bar-row">
        <div class="bar-tag" style="color:#f472b6;">OUT</div>
        <div class="bar-track"><div class="bar-fill" id="bar-out" style="background:linear-gradient(90deg,#ec4899,#f472b6);width:0%"></div></div>
        <div class="bar-amount" id="bar-out-label" style="color:#f472b6;">0 mL</div>
      </div>
    </div>
    <div id="log-label">Entry Log</div>
    <div id="entries-list"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-eyebrow">New Entry</div>
    <h2>Log Fluid</h2>
    <div class="field-group">
      <div class="field-label">TYPE</div>
      <div class="toggle-row">
        <button class="type-btn active-intake" id="btn-type-intake" onclick="setType('intake')">↑ Intake</button>
        <button class="type-btn" id="btn-type-output" onclick="setType('output')">↓ Output</button>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">SUBTYPE</div>
      <div class="subtype-row" id="subtype-row"></div>
    </div>
    <div class="field-group">
      <div class="field-label">AMOUNT (mL)</div>
      <input type="number" id="amount-input" placeholder="e.g. 250" oninput="onAmountChange()" />
      <div class="quick-row">
        <button class="quick-btn" onclick="setAmount(50)">50</button>
        <button class="quick-btn" onclick="setAmount(100)">100</button>
        <button class="quick-btn" onclick="setAmount(200)">200</button>
        <button class="quick-btn" onclick="setAmount(250)">250</button>
        <button class="quick-btn" onclick="setAmount(500)">500</button>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">NOTE (optional)</div>
      <input type="text" id="note-input" placeholder="e.g. post-op drainage" />
    </div>
    <div class="modal-actions">
      <button id="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="btn-submit" onclick="submitEntry()">Log Entry</button>
    </div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let entries = {};
  try { entries = JSON.parse(localStorage.getItem('fluidEntries') || '{}'); } catch {}

  let selectedDay = getTodayKey();
  let formType    = 'intake';
  let formSubtype = 'water';

  const INTAKE_SUBTYPES = ['water', 'IV fluid', 'oral intake', 'medication', 'other'];
  const OUTPUT_SUBTYPES = ['urine', 'drain', 'emesis', 'blood loss', 'other'];

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getTodayKey() {
    return new Date().toISOString().split('T')[0];
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function save() {
    localStorage.setItem('fluidEntries', JSON.stringify(entries));
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    renderSidebar();
    renderMain();
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    const today   = getTodayKey();
    const allDays = Object.keys(entries).sort((a, b) => b.localeCompare(a));
    if (!allDays.includes(today)) allDays.unshift(today);

    sidebar.innerHTML = allDays.map(day => {
      const di   = entries[day] || [];
      const din  = di.filter(e => e.type === 'intake').reduce((s, e) => s + e.amount, 0);
      const dout = di.filter(e => e.type === 'output').reduce((s, e) => s + e.amount, 0);
      const isToday = day === today;
      const isSel   = day === selectedDay;
      const label   = isToday ? 'Today' : formatDate(day).split(',')[0];
      const sub     = formatDate(day);
      const badges  = (din > 0 ? `<span class="badge-in">↑${din}</span>` : '') +
                      (dout > 0 ? `<span class="badge-out">↓${dout}</span>` : '');
      return `
        <button class="day-btn ${isSel ? 'active' : ''}" onclick="selectDay('${day}')">
          <div class="day-name">${label}</div>
          <div class="day-date">${sub}</div>
          ${(din > 0 || dout > 0) ? `<div class="day-badges">${badges}</div>` : ''}
        </button>`;
    }).join('');
  }

  function renderMain() {
    const today      = getTodayKey();
    const dayEntries = entries[selectedDay] || [];
    const totalIn    = dayEntries.filter(e => e.type === 'intake').reduce((s, e) => s + e.amount, 0);
    const totalOut   = dayEntries.filter(e => e.type === 'output').reduce((s, e) => s + e.amount, 0);
    const balance    = totalIn - totalOut;
    const balColor   = balance > 0 ? '#34d399' : balance < 0 ? '#f87171' : '#a1a1aa';
    const balSign    = balance >= 0 ? '+' : '−';

    // Day header
    const prefix = selectedDay === today ? 'Today — ' : '';
    document.getElementById('day-header').textContent =
      prefix + formatDate(selectedDay) + ', ' + new Date(selectedDay + 'T00:00:00').getFullYear();

    // Cards
    document.getElementById('val-intake').textContent  = '↑' + totalIn;
    document.getElementById('val-output').textContent  = '↓' + totalOut;
    document.getElementById('val-balance').style.color = balColor;
    document.getElementById('val-balance').textContent = balSign + Math.abs(balance);
    document.getElementById('card-balance').style.border = `1px solid ${balColor}30`;

    // Bars
    const barSection = document.getElementById('balance-bar-section');
    if (totalIn > 0 || totalOut > 0) {
      barSection.style.display = 'block';
      const mx = Math.max(totalIn, totalOut);
      document.getElementById('bar-in').style.width   = (totalIn  / mx * 100) + '%';
      document.getElementById('bar-out').style.width  = (totalOut / mx * 100) + '%';
      document.getElementById('bar-in-label').textContent  = totalIn  + ' mL';
      document.getElementById('bar-out-label').textContent = totalOut + ' mL';
    } else {
      barSection.style.display = 'none';
    }

    // Log label
    document.getElementById('log-label').textContent =
      `Entry Log (${dayEntries.length} entr${dayEntries.length === 1 ? 'y' : 'ies'})`;

    // Entries
    const list = document.getElementById('entries-list');
    if (dayEntries.length === 0) {
      list.innerHTML = `<div id="empty-state">No entries for this day.<br><span style="font-size:11px">Tap "+ Log Entry" to record fluid intake or output.</span></div>`;
    } else {
      const sorted = [...dayEntries].sort((a, b) => new Date(b.time) - new Date(a.time));
      list.innerHTML = sorted.map(entry => {
        const isIn  = entry.type === 'intake';
        const col   = isIn ? '#22d3ee' : '#f472b6';
        const bg    = isIn ? '#0e2030' : '#200e1a';
        const tagBg = isIn ? '#22d3ee15' : '#f472b615';
        const tag   = isIn ? '↑ IN' : '↓ OUT';
        return `
          <div class="entry-item" style="background:${bg};border:1px solid ${col}25;border-left:3px solid ${col};">
            <div class="entry-tag" style="color:${col};background:${tagBg};">${tag}</div>
            <div class="entry-body">
              <div class="entry-amount">${entry.amount} mL<span class="entry-subtype">${entry.subtype}</span></div>
              ${entry.note ? `<div class="entry-note">${entry.note}</div>` : ''}
            </div>
            <div class="entry-time">${formatTime(entry.time)}</div>
            <button class="entry-remove" onclick="removeEntry(${entry.id})" title="Remove">×</button>
          </div>`;
      }).join('');
    }
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  function selectDay(day) {
    selectedDay = day;
    render();
  }

  function removeEntry(id) {
    entries[selectedDay] = (entries[selectedDay] || []).filter(e => e.id !== id);
    save();
    render();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal() {
    selectedDay = getTodayKey();
    formType    = 'intake';
    formSubtype = 'water';
    document.getElementById('amount-input').value = '';
    document.getElementById('note-input').value   = '';
    updateTypeButtons();
    updateSubtypeButtons();
    updateSubmitBtn();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function setType(type) {
    formType    = type;
    formSubtype = type === 'intake' ? 'water' : 'urine';
    updateTypeButtons();
    updateSubtypeButtons();
  }

  function setAmount(v) {
    document.getElementById('amount-input').value = v;
    updateSubmitBtn();
  }

  function onAmountChange() { updateSubmitBtn(); }

  function updateTypeButtons() {
    document.getElementById('btn-type-intake').className =
      'type-btn ' + (formType === 'intake' ? 'active-intake' : '');
    document.getElementById('btn-type-output').className =
      'type-btn ' + (formType === 'output' ? 'active-output' : '');
  }

  function updateSubtypeButtons() {
    const subtypes = formType === 'intake' ? INTAKE_SUBTYPES : OUTPUT_SUBTYPES;
    document.getElementById('subtype-row').innerHTML = subtypes.map(s =>
      `<button class="subtype-btn ${s === formSubtype ? 'active' : ''}" onclick="setSubtype('${s}')">${s}</button>`
    ).join('');
  }

  function setSubtype(s) {
    formSubtype = s;
    updateSubtypeButtons();
  }

  function updateSubmitBtn() {
    const val = parseFloat(document.getElementById('amount-input').value);
    const btn = document.getElementById('btn-submit');
    if (val > 0 && !isNaN(val)) {
      btn.classList.add('ready');
    } else {
      btn.classList.remove('ready');
    }
  }

  function submitEntry() {
    const val = parseFloat(document.getElementById('amount-input').value);
    if (!val || isNaN(val) || val <= 0) return;
    const note = document.getElementById('note-input').value.trim();
    const entry = {
      id:      Date.now(),
      type:    formType,
      subtype: formSubtype,
      amount:  val,
      note:    note,
      time:    new Date().toISOString(),
    };
    if (!entries[selectedDay]) entries[selectedDay] = [];
    entries[selectedDay].push(entry);
    save();
    closeModal();
    render();
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.getElementById('btn-add').addEventListener('click', openModal);
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  render();
</script>
</body>
</html>
